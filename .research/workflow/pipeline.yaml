schema_version: 7
name: research-task-system
purpose: >-
  Route a TODO-defined research task through reusable Work and Codex Skills,
  maintain a rule-driven machine lifecycle state, and preserve the TODO as the
  only scientific handoff document.

artifacts:
  todo:
    template: .research/templates/TODO.md
    owns:
      - complete_research_definition
      - mathematical_and_algorithmic_specification
      - variables_controls_metrics_and_statistics
      - required_outputs_and_completion_criteria
      - output_path_references
    execution_edits_limited_to:
      - output_path_values
  task_state:
    template: .research/templates/task-state.yaml
    state_machine: .research/workflow/state-machine.yaml
    default_path_pattern: results/{todo_id}/task-state.yaml
    owns:
      - current_lifecycle_state
      - current_execution_status
      - state_machine_rule_set_version
      - evaluated_transition_rules
      - eligible_transition_rule_paths
      - codex_transition_recommendation
      - explicit_human_transition_history
      - immutable_transition_evaluation_snapshots
    prohibited_from_storing:
      - duplicated_todo_content
      - mathematical_definitions
      - scientific_result_narrative
      - formal_interpretation
    is_scientific_handoff: false
  technical_outputs:
    default_root: results/{todo_id}
    may_include:
      - task_state
      - raw_outputs
      - task_manifests
      - checkpoints
      - logs
      - run_level_tables
      - aggregate_tables
      - condition_merged_tables
      - notebooks
      - figures
      - figure_plans
      - figure_coverage_manifests
      - figure_integrity_audits
    do_not_replace_todo_as_handoff: true

roles:
  human:
    owns:
      - scientific_question_hypothesis_and_design
      - todo_approval
      - transition_rule_path_confirmation
      - semantic_change_approval
      - long_running_job_launch
      - figure_selection_and_revision_feedback
      - scientific_interpretation_and_report
      - todo_completion_or_stop_decision
      - next_todo_decision
  work:
    owns:
      - complete_todo_authoring
      - post_codex_table_curation
      - complete_data_figure_planning_and_drafts
      - final_figure_production_after_researcher_review
      - work_output_path_updates_in_todo
      - post_report_information_gain_assessment
  codex:
    owns:
      - task_state_initialization
      - implementation_within_todo_scope
      - risk_driven_testing
      - experiment_preflight_and_execution_code
      - immutable_raw_results
      - complete_aggregation_and_condition_merge
      - codex_result_path_updates_in_todo
      - transition_rule_evaluation
      - transition_recommendation
      - confirmed_transition_application

routing:
  implicit_entry_skill: skills/research-task-router/SKILL.md
  internal_skills_require_explicit_selection: true
  task_creation: skills/research-report-to-todos/SKILL.md
  task_execution: skills/research-todo-executor/SKILL.md
  state_transition: skills/research-state-transition/SKILL.md
  post_codex_table_curation: skills/publication-table-curation/SKILL.md
  post_codex_figure_planning: skills/research-figure-production/SKILL.md
  researcher_figure_review: skills/human-research-review-gate/SKILL.md
  final_figure_production: skills/research-figure-production/SKILL.md
  post_report_assessment: skills/post-report-assessment/SKILL.md
  current_state_rule: >-
    Resolve the active lifecycle state from the task-state YAML. If the file is
    absent, initialize it at todo_ready. Do not infer the active state from
    result-directory contents or from a stage name in old conversation text.
  transition_rule: >-
    After a state reaches a decision boundary, evaluate every outgoing rule,
    include the self-transition, write eligible rule paths and one Codex
    recommendation, and wait for explicit human confirmation before changing
    current.state.
  selection_rule: >-
    Select one primary workflow Skill, the Skill for the current state when it
    is executable, the state-transition Skill at decision boundaries, and only
    the capability Skills required by the TODO and requested action.

skill_catalog:
  workflows:
    task_router: skills/research-task-router/SKILL.md
    todo_executor: skills/research-todo-executor/SKILL.md
    state_transition: skills/research-state-transition/SKILL.md
  codex_states:
    exploration: skills/research-exploration/SKILL.md
    development: skills/research-development/SKILL.md
    pilot: skills/research-pilot/SKILL.md
    confirmation: skills/research-confirmation/SKILL.md
    ablation_diagnosis: skills/research-ablation-diagnosis/SKILL.md
  work_state:
    work_postprocessing:
      - skills/publication-table-curation/SKILL.md
      - skills/research-figure-production/SKILL.md
    figure_review:
      - skills/human-research-review-gate/SKILL.md
    figure_production:
      - skills/research-figure-production/SKILL.md
  capabilities:
    computing_implementation: skills/research-computing-implementation/SKILL.md
    agile_testing: skills/research-agile-testing/SKILL.md
    batch_execution: skills/research-batch-execution/SKILL.md
    evidence_aggregation: skills/research-evidence-aggregation/SKILL.md
    human_review_gate: skills/human-research-review-gate/SKILL.md

state_definitions:
  todo_ready:
    purpose: Hold a complete TODO until the human confirms an eligible initial state.
  exploration:
    purpose: Verify project mappings, data semantics, existing capabilities, and assumptions with the smallest decisive probes.
    default_capabilities:
      - skills/research-agile-testing/SKILL.md
      - skills/human-research-review-gate/SKILL.md
  development:
    purpose: Build the minimum scientifically faithful implementation that is credible for Pilot or another TODO-defined endpoint.
    default_capabilities:
      - skills/research-computing-implementation/SKILL.md
      - skills/research-agile-testing/SKILL.md
      - skills/human-research-review-gate/SKILL.md
  pilot:
    purpose: Run a controlled, complete Pilot grid with independent repeats, performance evidence, and full result preservation.
    default_capabilities:
      - skills/research-computing-implementation/SKILL.md
      - skills/research-agile-testing/SKILL.md
      - skills/research-evidence-aggregation/SKILL.md
      - skills/human-research-review-gate/SKILL.md
    conditional_capabilities:
      - skill: skills/research-batch-execution/SKILL.md
        when: multiple recoverable units, heavy I/O, or runtime require it
  confirmation:
    purpose: Execute the frozen confirmatory specification and preserve complete formal evidence.
    default_capabilities:
      - skills/research-computing-implementation/SKILL.md
      - skills/research-agile-testing/SKILL.md
      - skills/research-batch-execution/SKILL.md
      - skills/research-evidence-aggregation/SKILL.md
      - skills/human-research-review-gate/SKILL.md
  ablation_diagnosis:
    purpose: Distinguish a bounded set of approved component contributions, candidate explanations, or failure causes.
    default_capabilities:
      - skills/research-computing-implementation/SKILL.md
      - skills/research-agile-testing/SKILL.md
      - skills/human-research-review-gate/SKILL.md
    conditional_capabilities:
      - skill: skills/research-batch-execution/SKILL.md
        when: multiple recoverable units, heavy I/O, or runtime require it
      - skill: skills/research-evidence-aggregation/SKILL.md
        when: repeated research metrics are produced
  work_postprocessing:
    purpose: Curate complete tables, map all scientific table information to an efficient figure set, and prepare drafts covering all applicable data for researcher review.
    ordered_capabilities:
      - skills/publication-table-curation/SKILL.md
      - skills/research-figure-production/SKILL.md
    figure_skill_mode: planning
  figure_review:
    purpose: Present draft figures and their coverage record, then wait for explicit researcher recommendations.
    ordered_capabilities:
      - skills/human-research-review-gate/SKILL.md
  figure_production:
    purpose: Produce the final figure set from the approved recommendations and pass the figure integrity and traceability audit.
    ordered_capabilities:
      - skills/research-figure-production/SKILL.md
    figure_skill_mode: final
  completed:
    purpose: Preserve a human-confirmed terminal completion state.
  stopped:
    purpose: Preserve a human-confirmed terminal stop state.

state_protocol:
  initialize:
    - Derive todo_id and result root from the TODO and policy.
    - Create task-state YAML at todo_ready when it does not exist.
    - Evaluate initial outgoing rules before applying a human-selected state.
  before_execution:
    - Read the TODO, task-state YAML, policy, pipeline, and state machine.
    - Refuse execution when a transition review is awaiting a human decision.
    - Execute only current.state unless the human explicitly approves and applies another eligible rule path.
  after_codex_state:
    - Record execution status, artifact references, and predicate evidence in task-state YAML.
    - Set execution.decision_boundary_reached to true, current.status to awaiting_transition_evaluation, and transition_review.status to evaluation_required.
    - Invoke research-state-transition in Evaluate mode.
    - Keep current.state unchanged.
    - Present all eligible rule paths, including self, and one Codex recommendation.
    - Stop for human confirmation.
  after_work_planning_state:
    - Update only Work output path values in the TODO.
    - Record curated-table, figure-plan, draft, coverage, and source-basis facts in task-state YAML.
    - Set execution.decision_boundary_reached to true, current.status to awaiting_transition_evaluation, and transition_review.status to evaluation_required.
    - Return tables and draft figures without treating them as final.
    - Require Codex to evaluate the path to figure_review, self, rework, or stop before any later lifecycle action.
  during_figure_review:
    - Present every draft figure, its source and condition coverage, and the graphical-method basis.
    - Ask the researcher which figures to include, exclude, revise, or supplement with a labeled schematic.
    - Wait for the researcher's output; do not infer preferences from silence.
    - Treat any requested change to metrics, data scope, inclusion rules, or scientific claims as a semantic-change request.
    - Record figure-review predicate evidence by conversation or artifact reference, mark the decision boundary, and require Codex rule evaluation.
  after_final_figure_state:
    - Follow the recorded researcher recommendations without changing TODO-defined scientific meaning.
    - Audit complete condition coverage, statistical units, aggregation, titles, axes, units, legends, series labels, missingness, claim support, and rendered legibility.
    - Save the executed notebook, final figures, figure manifest, coverage manifest, and integrity audit inside the figure directory.
    - Record final figure predicates, mark the decision boundary, and require Codex to evaluate completion, revision, rework, or stop.
  apply_transition:
    - Require an eligible rule path explicitly selected by the human.
    - Resolve a target-only selection only when exactly one eligible rule reaches that target.
    - Require the rule ID and target to match the recorded evaluation and current revision.
    - Verify state revision and evaluated rule-set version.
    - Append immutable transition history with the complete evaluation snapshot and atomically update current.state.
    - Do not execute the target state unless execution is also explicitly authorized.

invariants:
  - The TODO is the only scientific task handoff document.
  - The task-state YAML is machine lifecycle control and never duplicates the TODO.
  - Codex and Work edit only Output References path values in the TODO during execution.
  - Every state evaluation includes an eligible transition to itself.
  - Rule evaluation does not change current.state.
  - A pending review is invalid when its state revision or rule-set version no longer matches.
  - Only an explicit human confirmation applies a transition.
  - A human may select any eligible rule path, including the self-transition, not only the Codex recommendation.
  - A rule path outside the eligible set requires new evidence, a rule-set change, or a TODO/scientific-scope decision before transition.
  - Every reported metric is computed at the TODO-defined independent-repeat level before aggregation unless another estimator is explicitly defined.
  - Every planned combination remains represented, including failed, missing, invalid, or incomplete combinations.
  - Bulk numerical results are never written one CSV row at a time.
  - A job at or above the runtime threshold is launched by the human after preflight.
  - Work starts table curation and figure planning only in work_postprocessing and after Codex result paths are present in the TODO.
  - Final figure production occurs only in figure_production after a separate figure_review state records researcher recommendations.
  - A validated Work-curated table may be a complete figure source when its manifest proves row and stable-key preservation.
  - Every scientifically relevant table field, planned condition, coverage state, and TODO metric is mapped to the draft figure set or explicitly accounted for in the coverage manifest.
  - A generalized diagram is labeled as a schematic, cannot replace quantitative data figures, and cannot imply unsupported mechanisms.
  - Completion requires a final audit for omitted conditions, misleading aggregation or scales, unsupported titles, and unexplained marks or series.
  - Work creates no additional Markdown handoff and records only curated-table paths and the figure-directory path in the TODO.
  - Established technical terms are preferred; local labels are defined operationally and evaluative adjectives require explicit criteria.
  - Examples clarify procedure but never supply task data, scientific definitions, thresholds, or approval.
  - No new scientific question is hidden inside an existing TODO.

figure_lifecycle_protocol:
  - Resolve Codex result paths from the TODO.
  - Confirm current.state is work_postprocessing.
  - Curate complete tables without changing row count or stable combination keys.
  - Inspect graphical methods in relevant papers when available and record the exact source; otherwise name the established convention used without inventing an attribution.
  - Map all scientific table information and conditions to an efficient set of data figures; use multiple panels or figures when one plot would obscure the data.
  - Create drafts covering all applicable data and machine-readable plan and coverage manifests in an ipynb using raw results, condition-merged tables, validated curated tables, or an explicit combination.
  - Update only the Work curated table paths and Work figure directory path in the TODO.
  - Mark the work_postprocessing decision boundary and require Codex evaluation before figure_review.
  - In figure_review, present drafts and coverage interactively, request researcher recommendations, and wait.
  - Mark the figure_review decision boundary after the output is available and require Codex evaluation before figure_production.
  - In figure_production, implement the recorded recommendations and run the final figure integrity and traceability audit.
  - Mark the figure_production decision boundary and require Codex evaluation before completion or rework.

communication_contract:
  - Use established scientific and engineering terminology when it exists.
  - Describe concrete operations before introducing a local label; never present an invented label as established terminology.
  - Tie robust, significant, optimal, complete, and generalizable to TODO-defined or recorded criteria.
  - Separate facts, interpretation, predicate judgments, and recommendations.
  - Prefer one concise worked example for a fragile rule and add a second only when it demonstrates a materially different boundary case.
