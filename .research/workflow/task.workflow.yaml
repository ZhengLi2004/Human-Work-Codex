schema_version: 3
pipeline: ".research/workflow/pipeline.yaml"

task:
  id: "TODO-[Work 预填：编号]"
  title: "[Work 预填：与 TODO 标题一致]"
  todo_file: "tasks/TODO-[编号]/TODO.md"
  human_research_report:
    path: "[Work 预填：人类完整研究报告路径]"
    version: "[Work 预填：版本、日期或提交标识]"
    source_sections:
      - "[Work 预填：与本 TODO 直接对应的章节]"
  status: "awaiting_human_todo_approval"

ownership:
  macro_research_and_reports: "human"
  abstraction_and_todo_narrative: "work"
  continuous_execution_and_evidence: "codex"
  direct_stage_decisions: "human_with_codex"
  post_codex_table_curation: "work"

work_dispatch:
  status: "drafted"
  proposed_route:
    stages:
      - exploration
      - development
      - pilot
      - confirmation
    optional:
      - ablation_diagnosis
    rationale: "[Work 预填：阶段路线如何承接人类研究报告与项目事实]"
  initial_scope: "[Work 预填：Codex 首个阶段允许完成的精确范围]"
  human_todo_approval:
    status: "awaiting"
    source: null
    approved_at: null
  dispatched_at: null

codex_call:
  status: "not_started"
  invocation_id: null
  started_at: null
  returned_at: null
  current_stage: "exploration"
  current_attempt: 1
  stage_status: "not_started"
  approved_scope: "[人类批准后由 Codex 记录：当前阶段或补充轮次的精确范围]"
  loadout:
    global_instructions:
      - "AGENTS.md"
    executor:
      - ".research/skills/codex/todo-executor/SKILL.md"
    phase_skill:
      - ".research/skills/codex/exploration/SKILL.md"
    capabilities:
      - ".research/skills/capabilities/human-review-gate/SKILL.md"
      - ".research/skills/capabilities/agile-testing/SKILL.md"
    conditional_capabilities:
      - skill: ".research/skills/capabilities/evidence-aggregation/SKILL.md"
        when: "current stage produces research metrics"
      - skill: ".research/skills/capabilities/batch-execution/SKILL.md"
        when: "multiple combinations, repeats, samples, recovery, or runtime require it"

  execution:
    implementation_artifacts: []
    test_artifacts: []
    experiment_specs: []
    raw_data_roots: []
    runs_tables: []
    aggregate_full_tables: []
    aggregation_manifests: []
    todo_evidence_ids: []

  stage_review_gate:
    status: "not_started"
    review_packet: null
    todo_evidence_ids: []
    codex_recommendation:
      action: null
      rationale: null
      proposed_next_stage: null
      proposed_next_scope: null
      unresolved_risks: []
    human_decision:
      status: "awaiting"
      action: null
      target_stage: null
      approved_scope: null
      comments_source: null
      decided_at: null
    resumed_at: null

  long_run_gate:
