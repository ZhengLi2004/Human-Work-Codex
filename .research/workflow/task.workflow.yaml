    reason: null
    preflight_evidence: null
    one_line_command: null
    estimated_runtime: null
    estimated_resources: null
    checkpoint_path: null
    log_path: null
    result_path: null
    human_launch_source: null
    results_available_at: null

  stage_history: []
  blocker: null

codex_return:
